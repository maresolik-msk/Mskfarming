<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Burgundy Background -->
  <rect width="192" height="192" rx="42" fill="#812F0F"/>
  
  <!-- MILA Logo Design -->
  <!-- Wheat/Grain Symbol -->
  <g transform="translate(96, 96)">
    <!-- Center stalk -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#F5E6D3" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Wheat grains (left side) -->
    <ellipse cx="-8" cy="-35" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="-8" cy="-20" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="-8" cy="-5" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="-8" cy="10" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="-8" cy="25" rx="6" ry="9" fill="#F5E6D3"/>
    
    <!-- Wheat grains (right side) -->
    <ellipse cx="8" cy="-35" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="8" cy="-20" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="8" cy="-5" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="8" cy="10" rx="6" ry="9" fill="#F5E6D3"/>
    <ellipse cx="8" cy="25" rx="6" ry="9" fill="#F5E6D3"/>
    
    <!-- AI Accent - Circuit pattern -->
    <circle cx="0" cy="-45" r="3" fill="#F59E0B" opacity="0.8"/>
    <circle cx="-12" cy="-30" r="2" fill="#F59E0B" opacity="0.6"/>
    <circle cx="12" cy="-30" r="2" fill="#F59E0B" opacity="0.6"/>
  </g>
  
  <!-- MILA Text -->
  <text x="96" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">MILA</text>
</svg>
