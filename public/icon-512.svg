<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Burgundy Background with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#812F0F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B2710;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  
  <!-- MILA Logo Design - Larger and more detailed -->
  <g transform="translate(256, 256)">
    <!-- Center stalk with gradient -->
    <line x1="0" y1="-140" x2="0" y2="140" stroke="#F5E6D3" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Wheat grains - Left side -->
    <ellipse cx="-22" cy="-100" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="-22" cy="-60" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="-22" cy="-20" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="-22" cy="20" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="-22" cy="60" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="-22" cy="100" rx="16" ry="24" fill="#F5E6D3"/>
    
    <!-- Wheat grains - Right side -->
    <ellipse cx="22" cy="-100" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="22" cy="-60" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="22" cy="-20" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="22" cy="20" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="22" cy="60" rx="16" ry="24" fill="#F5E6D3"/>
    <ellipse cx="22" cy="100" rx="16" ry="24" fill="#F5E6D3"/>
    
    <!-- AI Accent - Circuit pattern with glow -->
    <g filter="url(#glow)">
      <circle cx="0" cy="-120" r="8" fill="#F59E0B"/>
      <circle cx="-30" cy="-80" r="5" fill="#F59E0B" opacity="0.8"/>
      <circle cx="30" cy="-80" r="5" fill="#F59E0B" opacity="0.8"/>
      <line x1="0" y1="-120" x2="-30" y2="-80" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
      <line x1="0" y1="-120" x2="30" y2="-80" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    </g>
  </g>
  
  <!-- MILA Text with shadow -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">MILA</text>
  <text x="256" y="480" font-family="Arial, sans-serif" font-size="20" fill="#F5E6D3" text-anchor="middle" opacity="0.9">Field Intelligence</text>
</svg>
